<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="/landing/img/favicon.png" />
    <link rel="apple-touch-icon" href="/landing/img/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SetupFX</title>
    <script>
      // Set theme before React loads to prevent flash of unstyled content.
      // Must read the SAME key React writes ('SetupFX-dark-mode' — mixed case).
      // Previously read the lowercase variant which never matched, causing
      // every page load to flash dark before React corrected it to light.
      (function() {
        var saved = localStorage.getItem('SetupFX-dark-mode');
        var isDark = saved === null ? true : saved === 'true';
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        // Match the chart/page background immediately so the chart container
        // doesn't bleed through as black during the loading flash.
        document.documentElement.style.backgroundColor = isDark ? '#000000' : '#ffffff';
      })();
    </script>
    <style>
      /* Prevent flash - set initial background */
      html, body { background-color: #000000; }
      html[data-theme="light"], html[data-theme="light"] body { background-color: #ffffff; }
    </style>
    <script src="/charting_library/charting_library.standalone.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
