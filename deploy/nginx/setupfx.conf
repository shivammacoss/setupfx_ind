# ─────────────────────────────────────────────────────────────────────
#  SetupFX Broker — production nginx config
#  Live at /etc/nginx/sites-available/setupfx on the EC2.
#  scripts/deploy.sh syncs this file when it changes between commits.
# ─────────────────────────────────────────────────────────────────────

# Connection upgrade map — "upgrade" only when client requests WebSocket,
# else "close". Without this, normal HTTP requests (CORS preflight OPTIONS)
# hang because nginx sends Connection: upgrade to backend, confusing uvicorn.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP → HTTPS redirect for all subdomains ──────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name setupfx.io www.setupfx.io admin.setupfx.io api.setupfx.io;
    return 301 https://$host$request_uri;
}

# ── setupfx.io / www → user Next.js (3000) ────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name setupfx.io www.setupfx.io;

    ssl_certificate     /etc/ssl/cloudflare/setupfx-origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/setupfx-origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }
}

# ── admin.setupfx.io → admin Next.js (3001) ───────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.setupfx.io;

    ssl_certificate     /etc/ssl/cloudflare/setupfx-origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/setupfx-origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }
}

# ── api.setupfx.io → FastAPI (8000) + WebSocket ───────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.setupfx.io;

    ssl_certificate     /etc/ssl/cloudflare/setupfx-origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/setupfx-origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
