name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancel in-progress runs of the same ref so a fresh push doesn't waste minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: lint + import-check ──────────────────────────────────────
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt

      - name: Ruff lint (non-blocking)
        run: ruff check app/ || true

      - name: Ruff format check (non-blocking)
        run: ruff format --check app/ || true

      - name: Import smoke test
        # Catches the obvious "broke an import" mistake without standing
        # up a real Mongo. ENV defaults to mock so config validation passes.
        env:
          APP_ENV: development
          MONGODB_URL: mongodb://localhost:27017/test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ci-dummy-secret
          INFOWAY_API_KEY: ""
        run: python -c "from app.main import app; print('app imports OK:', app.title)"

      - name: Tests (if any)
        if: ${{ hashFiles('backend/tests/**/*.py') != '' }}
        env:
          APP_ENV: development
          MONGODB_URL: mongodb://localhost:27017/test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ci-dummy-secret
        run: pytest -q || true

  # ── Frontend user app ─────────────────────────────────────────────────
  frontend-user:
    name: Frontend user (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-user
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend-user/package-lock.json

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.json

      - name: Lint (non-blocking)
        run: npm run lint || true

      - name: Build (dummy env)
        env:
          NEXT_PUBLIC_API_URL: https://api.setupfx.io
          NEXT_PUBLIC_WS_URL: wss://api.setupfx.io
        run: npm run build

  # ── Frontend admin app ────────────────────────────────────────────────
  frontend-admin:
    name: Frontend admin (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-admin
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend-admin/package-lock.json

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.json

      - name: Lint (non-blocking)
        run: npm run lint || true

      - name: Build (dummy env)
        env:
          NEXT_PUBLIC_API_URL: https://api.setupfx.io
          NEXT_PUBLIC_ADMIN_KEY: ci-dummy-admin-key
        run: npm run build
